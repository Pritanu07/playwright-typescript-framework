name: Playwright CI + HTML Report (POM_SAUCEDEMO)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout Code
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # Setup Node
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # Install Dependencies
      # =========================
      - name: Install Dependencies
        run: npm ci

      # =========================
      # Install Playwright Browsers
      # =========================
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # =========================
      # Run Tests (POM_SAUCEDEMO)
      # =========================
      - name: Run Playwright Tests
        run: npx playwright test
      - name: Ensure report exists
        run: test -d playwright-report || mkdir playwright-report

      # =========================
      # Debug Report Folder (IMPORTANT)
      # =========================
      - name: Verify Playwright Report
        if: always()
        run: ls -R playwright-report || echo "No report folder found"

      # =========================
      # Upload Test Artifacts (Screenshots/Videos/Trace)
      # =========================
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      # =========================
      # Upload HTML Report
      # =========================
      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # =========================
      # Deploy Report to GitHub Pages
      # =========================
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-report
          force_orphan: true