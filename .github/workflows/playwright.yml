name: UI + API + Allure CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre

          curl -L -o allure.tgz https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.27.0/allure-commandline-2.27.0.tgz

          tar -xzf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/bin/allure

      - name: Debug Postman files
        run: |
          ls -R postman || true

      - name: Run UI Tests
        run: npm run test:ci

      # 🔥 DEBUG STEP (IMPORTANT)
      - name: Check Allure Results Folder
        run: |
          echo "===== ALLURE RESULTS ====="
          ls -R allure-results || true

      # ✅ GENERATE ALLURE REPORT (AFTER RESULTS EXIST)
      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      # ✅ UPLOAD RAW RESULTS (VERY IMPORTANT FOR DEBUGGING)
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      # ✅ UPLOAD FINAL HTML REPORT
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Run API Tests
        run: npm run test:api:report

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload Newman Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: postman/reports/newman-report.html